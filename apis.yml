name: Federal Maritime Commission
description: >-
  The Federal Maritime Commission (FMC) is an independent agency of the
  United States government responsible for the regulation of international
  ocean transportation. The FMC oversees the practices of ocean common
  carriers, marine terminal operators, and other regulated entities.
